<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
<title>JR Hortifruti — Poster Animado</title>
<defs>
  <clipPath id="logoClip">
    <circle cx="340" cy="340" r="295"/>
  </clipPath>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700&amp;family=National+Park:wght@700&amp;family=Outfit:wght@400;700&amp;display=swap');

    /* ─── POSTER: fade-in do fundo ─── */
    #bg-rect { animation: bgFade .6s ease both; }
    @keyframes bgFade { from{opacity:0} to{opacity:1} }

    /* ─── MOLDURA desenha o contorno ─── */
    #frame-outer {
      stroke-dasharray: 4320; stroke-dashoffset: 4320;
      animation: drawLine 1.6s .2s cubic-bezier(.4,0,.2,1) forwards;
    }
    #frame-inner {
      stroke-dasharray: 4220; stroke-dashoffset: 4220;
      animation: drawLine 1.6s .35s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes drawLine { to{ stroke-dashoffset:0; } }

    /* ─── ORNAMENTOS DOS CANTOS ─── */
    .corner { animation: cornerPop .5s cubic-bezier(.22,.68,0,1.4) both; }
    #c1{animation-delay:.7s} #c2{animation-delay:.8s}
    #c3{animation-delay:.75s}#c4{animation-delay:.85s}
    @keyframes cornerPop { from{opacity:0;transform:scale(0)} to{opacity:1;transform:scale(1)} }

    /* ─── FOLHAS DAS CANTOS ─── */
    .leaf { animation: leafDrop .6s cubic-bezier(.22,.68,0,1.3) both; }
    #l1{animation-delay:.9s} #l2{animation-delay:.95s}
    #l3{animation-delay:1s}  #l4{animation-delay:1.05s}
    #l5{animation-delay:1.1s}#l6{animation-delay:1.15s}
    #l7{animation-delay:1.2s}#l8{animation-delay:1.25s}
    @keyframes leafDrop { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:none} }

    /* ─── LOGO ENTRA DE CIMA ─── */
    #logo-group {
      animation: logoDropIn 1s .4s cubic-bezier(.22,.68,0,1.15) both;
    }
    @keyframes logoDropIn {
      from{ transform:translateY(-60px); opacity:0; }
      to  { transform:none; opacity:1; }
    }

    /* ─── Frutas giram lentamente ─── */
    #fruits-poster {
      transform-origin: 540px 338px;
      animation: fruitSpin 30s 1.4s linear infinite;
    }
    @keyframes fruitSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    /* ─── ANEL OURO outer ─── */
    #logo-outer-ring {
      transform-origin: 540px 338px;
      animation: ringScale .9s .4s cubic-bezier(.22,.68,0,1.2) both;
    }
    @keyframes ringScale {
      from{ transform:scale(.2); opacity:0; }
      to  { transform:scale(1);  opacity:1; }
    }

    /* ─── JR letters ─── */
    #poster-jr {
      transform-origin: 540px 338px;
      animation: jrBounce 1s .9s cubic-bezier(.22,.68,0,1.3) both;
    }
    @keyframes jrBounce {
      from{ transform:scale(.5); opacity:0; }
      to  { transform:scale(1);  opacity:1; }
    }

    /* ─── BARRA VERDE desliza da esquerda ─── */
    #green-bar {
      animation: barSlide .8s 1.2s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes barSlide {
      from{ transform:scaleX(0); transform-origin:left; opacity:0; }
      to  { transform:scaleX(1); transform-origin:left; opacity:1; }
    }

    /* ─── HORTIFRUTI texto ─── */
    #poster-hf {
      animation: riseUp .7s 1.4s cubic-bezier(.22,.68,0,1.2) both;
    }
    @keyframes riseUp {
      from{ transform:translateY(10px); opacity:0; }
      to  { transform:none; opacity:1; }
    }

    /* ─── DELIVERY, tagline, tel, endereço ─── */
    #poster-del  { animation: riseUp .6s 1.6s cubic-bezier(.22,.68,0,1.2) both; }
    #poster-tag  { animation: riseUp .6s 1.75s cubic-bezier(.22,.68,0,1.2) both; }
    #poster-tel  { animation: riseUp .6s 1.9s cubic-bezier(.22,.68,0,1.2) both; }
    #poster-addr { animation: riseUp .6s 2.05s cubic-bezier(.22,.68,0,1.2) both; }
    #poster-dmd  { animation: riseUp .5s 1.82s cubic-bezier(.22,.68,0,1.4) both; }

    /* ─── HOVER no logo: pulso suave ─── */
    #logo-group:hover { cursor:pointer; }
    #logo-group:hover #logo-outer-ring {
      animation: ringScale .9s .4s cubic-bezier(.22,.68,0,1.2) both,
                 logoPulse 2s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%,100%{ transform:scale(1);   }
      50%    { transform:scale(1.03);}
    }
  </style>
</defs>

<!-- ══════════════ FUNDO CREME + PONTILHADO ══════════════ -->
<rect id="bg-rect" width="1080" height="1080" fill="#E8E2D0"/>

<!-- Dotted pattern via repeated circles -->
<g opacity=".35">
  <!-- row pattern (28px gap) – simplified as dashed grid using lines -->
  <line x1="0" y1="0" x2="1080" y2="0" stroke="#C8BFA0" stroke-width="0" stroke-dasharray="1,27"/>
  <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="14" cy="14" r="1.2" fill="#C8BFA0"/>
  </pattern>
  <rect width="1080" height="1080" fill="url(#dots)"/>
</g>

<!-- ══════════════ MOLDURA DOURADA ══════════════ -->
<rect id="frame-outer" x="28" y="28" width="1024" height="1024" rx="4"
      fill="none" stroke="#BA942A" stroke-width="2"/>
<rect id="frame-inner" x="38" y="38" width="1004" height="1004" rx="2"
      fill="none" stroke="#BA942A" stroke-width="1" opacity=".5"/>

<!-- ── ORNAMENTOS NOS CANTOS (quadradinhos) ── -->
<g id="c1" class="corner" transform="translate(28,28)">
  <rect x="-14" y="-14" width="28" height="28" fill="none" stroke="#BA942A" stroke-width="2"/>
  <rect x="-8" y="-8"   width="16" height="16" fill="none" stroke="#BA942A" stroke-width="1" opacity=".6"/>
</g>
<g id="c2" class="corner" transform="translate(1052,28)">
  <rect x="-14" y="-14" width="28" height="28" fill="none" stroke="#BA942A" stroke-width="2"/>
  <rect x="-8" y="-8"   width="16" height="16" fill="none" stroke="#BA942A" stroke-width="1" opacity=".6"/>
</g>
<g id="c3" class="corner" transform="translate(28,1052)">
  <rect x="-14" y="-14" width="28" height="28" fill="none" stroke="#BA942A" stroke-width="2"/>
  <rect x="-8" y="-8"   width="16" height="16" fill="none" stroke="#BA942A" stroke-width="1" opacity=".6"/>
</g>
<g id="c4" class="corner" transform="translate(1052,1052)">
  <rect x="-14" y="-14" width="28" height="28" fill="none" stroke="#BA942A" stroke-width="2"/>
  <rect x="-8" y="-8"   width="16" height="16" fill="none" stroke="#BA942A" stroke-width="1" opacity=".6"/>
</g>

<!-- ── FOLHAS DECORATIVAS ── -->
<!-- Top-left -->
<g id="l1" class="leaf" transform="translate(60,88)">
  <path d="M0,0 C-16,-38 -30,-14 -10,0" fill="#52A84C"/>
  <path d="M0,0 C0,-42 16,-36 10,0" fill="#227A3A"/>
</g>
<g id="l2" class="leaf" transform="translate(80,68)">
  <path d="M0,0 C14,-36 28,-12 8,0" fill="#52A84C" opacity=".75"/>
</g>
<!-- Top-right -->
<g id="l3" class="leaf" transform="translate(1020,88) scale(-1,1)">
  <path d="M0,0 C-16,-38 -30,-14 -10,0" fill="#52A84C"/>
  <path d="M0,0 C0,-42 16,-36 10,0" fill="#227A3A"/>
</g>
<g id="l4" class="leaf" transform="translate(1000,68) scale(-1,1)">
  <path d="M0,0 C14,-36 28,-12 8,0" fill="#52A84C" opacity=".75"/>
</g>
<!-- Bottom-left -->
<g id="l5" class="leaf" transform="translate(60,992) scale(1,-1)">
  <path d="M0,0 C-16,-38 -30,-14 -10,0" fill="#52A84C"/>
  <path d="M0,0 C0,-42 16,-36 10,0" fill="#227A3A"/>
</g>
<g id="l6" class="leaf" transform="translate(80,1012) scale(1,-1)">
  <path d="M0,0 C14,-36 28,-12 8,0" fill="#52A84C" opacity=".75"/>
</g>
<!-- Bottom-right -->
<g id="l7" class="leaf" transform="translate(1020,992) scale(-1,-1)">
  <path d="M0,0 C-16,-38 -30,-14 -10,0" fill="#52A84C"/>
  <path d="M0,0 C0,-42 16,-36 10,0" fill="#227A3A"/>
</g>
<g id="l8" class="leaf" transform="translate(1000,1012) scale(-1,-1)">
  <path d="M0,0 C14,-36 28,-12 8,0" fill="#52A84C" opacity=".75"/>
</g>

<!-- ══════════════ LOGO CIRCULAR (centrado, topo) ══════════════ -->
<!-- Logo group: centrado em x=540, com topo em y=42, raio 310 → cy=352 -->
<g id="logo-group" transform="translate(200, 42)">

  <!-- OUTER GOLD RING -->
  <circle id="logo-outer-ring" cx="340" cy="310" r="310" fill="#BA942A"/>
  <!-- MAIN GREEN -->
  <circle cx="340" cy="310" r="295" fill="#124A26"/>

  <!-- FRUITS (rotate around logo center) -->
  <g id="fruits-poster" clip-path="url(#logoClip2)" opacity="0.22">
    <!-- Watermelon -->
    <g transform="translate(105,400)">
      <path d="M0,0 A80,80 0 0,1 140,0 L70,-70Z" fill="#52A84C"/>
      <path d="M10,0 A70,70 0 0,1 130,0 L70,-62Z" fill="#227A3A"/>
      <ellipse cx="50" cy="-18" rx="4" ry="6" fill="#124A26" transform="rotate(-10,50,-18)"/>
      <ellipse cx="70" cy="-30" rx="4" ry="6" fill="#124A26"/>
      <ellipse cx="90" cy="-18" rx="4" ry="6" fill="#124A26" transform="rotate(10,90,-18)"/>
    </g>
    <!-- Lemon -->
    <g transform="translate(490,112)">
      <ellipse cx="0" cy="0" rx="42" ry="32" fill="#BA942A"/>
      <ellipse cx="0" cy="0" rx="34" ry="25" fill="#D4A830" opacity=".6"/>
      <ellipse cx="-43" cy="0" rx="8" ry="5" fill="#BA942A"/>
      <ellipse cx="43"  cy="0" rx="8" ry="5" fill="#BA942A"/>
    </g>
    <!-- Carrot -->
    <g transform="translate(148,120)">
      <path d="M0,0 L-18,70 L18,70Z" fill="#BA942A"/>
      <path d="M0,0 C-12,-30 -24,-10 -8,0" fill="#52A84C"/>
      <path d="M0,0 C0,-32 12,-30 8,0" fill="#227A3A"/>
      <path d="M0,0 C12,-28 22,-8 6,0" fill="#52A84C"/>
    </g>
    <!-- Avocado -->
    <g transform="translate(508,432)">
      <path d="M0,-55 C30,-55 52,-20 52,10 C52,40 28,60 0,60 C-28,60 -52,40 -52,10 C-52,-20 -30,-55 0,-55Z" fill="#124A26"/>
      <path d="M0,-40 C22,-40 38,-14 38,10 C38,34 20,45 0,45 C-20,45 -38,34 -38,10 C-38,-14 -22,-40 0,-40Z" fill="#BA942A"/>
      <ellipse cx="0" cy="12" rx="14" ry="18" fill="#7A5C1A"/>
    </g>
    <!-- Tomato -->
    <g transform="translate(430,64)">
      <circle cx="0" cy="5" r="30" fill="#BA942A"/>
      <circle cx="0" cy="5" r="22" fill="#9A7820" opacity=".4"/>
      <rect x="-2" y="-28" width="4" height="16" rx="2" fill="#52A84C"/>
    </g>
    <!-- Broccoli -->
    <g transform="translate(220,482)">
      <rect x="-7" y="10" width="14" height="36" rx="4" fill="#52A84C"/>
      <circle cx="0"  cy="-5" r="20" fill="#52A84C"/>
      <circle cx="-18" cy="5" r="15" fill="#227A3A"/>
      <circle cx="18"  cy="5" r="15" fill="#227A3A"/>
    </g>
    <!-- Orange -->
    <g transform="translate(90,252)">
      <path d="M0,0 A40,40 0 0,1 0,80Z" fill="#BA942A"/>
      <line x1="0" y1="40" x2="36" y2="24" stroke="#124A26" stroke-width="1.5"/>
      <line x1="0" y1="40" x2="36" y2="40" stroke="#124A26" stroke-width="1.5"/>
      <line x1="0" y1="40" x2="36" y2="56" stroke="#124A26" stroke-width="1.5"/>
    </g>
    <!-- Pepper -->
    <g transform="translate(555,272)">
      <path d="M0,-40 C18,-40 28,-20 28,5 C28,30 14,48 0,48 C-14,48 -28,30 -28,5 C-28,-20 -18,-40 0,-40Z" fill="#52A84C"/>
      <rect x="-2" y="-46" width="4" height="12" rx="2" fill="#124A26"/>
    </g>
    <!-- Grapes -->
    <g transform="translate(470,518)">
      <circle cx="0"  cy="0"  r="12" fill="#52A84C"/>
      <circle cx="18" cy="0"  r="12" fill="#227A3A"/>
      <circle cx="9"  cy="16" r="12" fill="#52A84C"/>
      <circle cx="27" cy="16" r="12" fill="#227A3A"/>
      <circle cx="18" cy="32" r="12" fill="#52A84C"/>
    </g>
    <!-- Strawberry -->
    <g transform="translate(175,68)">
      <path d="M0,38 C-22,20 -26,-5 -10,-20 C-4,-24 4,-24 10,-20 C26,-5 22,20 0,38Z" fill="#BA942A"/>
      <path d="M0,-20 C-10,-32 -20,-26 -10,-20" fill="#52A84C"/>
      <path d="M0,-20 C10,-32 20,-26 10,-20" fill="#52A84C"/>
    </g>
  </g>

  <!-- inner ring -->
  <circle cx="340" cy="310" r="260" fill="none" stroke="#BA942A" stroke-width="1.2" opacity=".35"/>

  <!-- horizontal rules -->
  <line x1="220" y1="248" x2="300" y2="248" stroke="#BA942A" stroke-width="1.5" opacity=".7"/>
  <line x1="382" y1="248" x2="462" y2="248" stroke="#BA942A" stroke-width="1.5" opacity=".7"/>
  <line x1="220" y1="382" x2="305" y2="382" stroke="#BA942A" stroke-width="1.5" opacity=".7"/>
  <line x1="358" y1="382" x2="462" y2="382" stroke="#BA942A" stroke-width="1.5" opacity=".7"/>

  <!-- JR -->
  <text id="poster-jr" x="340" y="352" text-anchor="middle"
        font-family="'Big Shoulders Display',Impact,sans-serif"
        font-weight="700" font-size="175" fill="#FFFFFF" letter-spacing="-4">JR</text>

  <!-- gold dot -->
  <circle cx="330" cy="370" r="5" fill="#BA942A">
    <animate attributeName="r" values="5;7;5" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- HORTIFRUTI inside circle -->
  <text x="340" y="428" text-anchor="middle"
        font-family="'Big Shoulders Display',Impact,sans-serif"
        font-weight="700" font-size="42" fill="#BA942A" letter-spacing="4">HORTIFRUTI</text>

  <!-- DELIVERY inside circle -->
  <text x="340" y="462" text-anchor="middle"
        font-family="Outfit,Arial,sans-serif"
        font-weight="400" font-size="22" fill="#52A84C" letter-spacing="6">DELIVERY</text>

  <!-- outer deco ring -->
  <circle cx="340" cy="310" r="308" fill="none" stroke="#BA942A" stroke-width="3" opacity=".6">
    <animate attributeName="stroke-dashoffset"
             from="1936" to="0" dur="1.4s" begin=".1s" fill="freeze"
             calcMode="spline" keySplines="0.4 0 0.2 1"/>
    <animate attributeName="stroke-dasharray"
             from="1936 1936" to="1936 0" dur=".01s" begin=".1s" fill="freeze"/>
  </circle>

</g>

<!-- CLIPPATH for poster logo fruits (adjusted cy) -->
<defs>
  <clipPath id="logoClip2">
    <circle cx="340" cy="310" r="295"/>
  </clipPath>
</defs>

<!-- ══════════════ BARRA HORTIFRUTI ══════════════ -->
<g id="green-bar">
  <rect x="42" y="695" width="996" height="110" fill="#124A26"/>
  <!-- gold border on bar -->
  <rect x="39" y="692" width="1002" height="116" fill="none" stroke="#BA942A" stroke-width="2.5" opacity=".8"/>
  <text id="poster-hf" x="540" y="772" text-anchor="middle"
        font-family="'Big Shoulders Display',Impact,sans-serif"
        font-weight="700" font-size="106" fill="#FFFFFF" letter-spacing="6">HORTIFRUTI</text>
</g>

<!-- ── DELIVERY ── -->
<text id="poster-del" x="540" y="840" text-anchor="middle"
      font-family="Outfit,Arial,sans-serif"
      font-weight="700" font-size="46" fill="#52A84C" letter-spacing="6">·DELIVERY·</text>

<!-- ── TAGLINE ── -->
<text id="poster-tag" x="540" y="878" text-anchor="middle"
      font-family="Outfit,Arial,sans-serif"
      font-weight="400" font-size="24" fill="#124A26" letter-spacing="3" opacity=".7">DIRETO DO CAMPO PRA SUA MESA</text>

<!-- ── DIAMOND ── -->
<polygon id="poster-dmd" points="540,900 548,912 540,924 532,912"
         fill="#BA942A" opacity=".8"/>

<!-- ── TELEFONE ── -->
<text id="poster-tel" x="540" y="972" text-anchor="middle"
      font-family="Outfit,Arial,sans-serif"
      font-weight="700" font-size="42" fill="#124A26">⊙ (21) 95689-3764</text>

<!-- ── ENDEREÇO ── -->
<text id="poster-addr" x="540" y="1014" text-anchor="middle"
      font-family="Outfit,Arial,sans-serif"
      font-weight="400" font-size="26" fill="#124A26" opacity=".7">Rua Tocantins, 44  ·  Sarapuí, RJ</text>

</svg>
